<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuito Cero - Soluciones Tecnológicas</title>
    <style>
        /* --- ESTILOS GENERALES --- */
        :root {
            --color-fondo: #ffffff;
            --color-principal: #ff0000;
            --color-secundario: #000000;
            --color-acento: #333333;
            --fuente-principal: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --sombra-suave: 0 4px 6px rgba(0, 0, 0, 0.1);
            --radio-borde: 8px;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--color-fondo);
            color: var(--color-secundario);
            font-family: var(--fuente-principal);
            line-height: 1.6;
        }

        header {
            background-color: var(--color-secundario);
            color: var(--color-fondo);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--sombra-suave);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--color-principal);
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 20px;
        }

        nav a {
            text-decoration: none;
            color: var(--color-fondo);
            font-weight: 500;
            transition: color 0.3s ease;
        }

        nav a:hover { color: var(--color-principal); }

        .hero {
            padding: 4rem 2rem;
            text-align: center;
            background: linear-gradient(135deg, #fdfdfd 0%, #f4f4f4 100%);
        }

        .hero h1 { font-size: 3rem; margin-bottom: 1rem; }

        .cta-button {
            display: inline-block;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: var(--radio-borde);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .btn-rojo { background-color: var(--color-principal); color: var(--color-fondo); }
        .btn-negro { background-color: var(--color-secundario); color: var(--color-fondo); margin-left: 10px; }
        
        .btn-rojo:hover, .btn-negro:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        .tray-section { padding: 3rem 2rem; }
        .tray-container {
            background-color: #f9f9f9;
            border: 2px solid var(--color-secundario);
            border-radius: var(--radio-borde);
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .tray-header {
            border-bottom: 2px solid var(--color-principal);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
        }

        .tray-item {
            background: #fff;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 4px;
            border-left: 4px solid var(--color-secundario);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        footer {
            background-color: var(--color-acento);
            color: #ccc;
            text-align: center;
            padding: 2rem;
            margin-top: 4rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Circuito<span style="color:white;">Cero</span></div>
        <nav>
            <ul>
                <li><a href="#inicio">Inicio</a></li>
                <li><a href="#servicios">Servicios</a></li>
                <li><a href="#contacto">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero" id="inicio">
        <h1>Potencia tu Conectividad</h1>
        <p>Soluciones integrales en redes y seguridad digital.</p>
        <a href="#servicios" class="cta-button btn-rojo">Ver Servicios</a>
        <a href="#contacto" class="cta-button btn-negro" id="btnDemo">Solicitar Demo</a>
    </section>

    <section class="tray-section" id="servicios">
        <div class="tray-container">
            <div class="tray-header">
                <h2>Panel de Control</h2>
                <span style="background:red; color:white; padding:5px 10px; border-radius:20px; font-size:0.8rem;">ACTIVO</span>
            </div>
            
            <div class="tray-item">
                <div><strong>Red Principal:</strong> <span style="color: green;">Estable</span></div>
                <button class="cta-button btn-negro" id="btnGestionar" style="padding: 5px 15px; font-size: 0.8rem;">Gestionar</button>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Circuito Cero. Tecnología para Ingeniería.</p>
    </footer>

    <script>
        // Esta función envía los datos a tu n8n en Render
        async function conectarConAgente(accion) {
            // USA TU URL DE RENDER AQUÍ (Webhook de producción o test)
            const n8n_url = 'https://n8n-tu-app.onrender.com/webhook-test/contacto-circuito-cero';
            
            console.log("Iniciando conexión con n8n para:", accion);

            try {
                const respuesta = await fetch(n8n_url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        evento: accion,
                        sitio: "Circuito Cero Web",
                        usuario_id: "Admin_Test",
                        fecha: new Date().toLocaleString()
                    })
                });

                if (respuesta.ok) {
                    alert("¡Agente n8n activado con éxito! Acción: " + accion);
                } else {
                    alert("Error: n8n respondió pero con error.");
                }
            } catch (err) {
                console.error("Fallo de red:", err);
                alert("No se pudo conectar con n8n. Revisa si está encendido en Render.");
            }
        }

        // Eventos para los botones
        document.getElementById('btnGestionar').addEventListener('click', () => conectarConAgente('Gestionar Red'));
        document.getElementById('btnDemo').addEventListener('click', (e) => {
            e.preventDefault();
            conectarConAgente('Solicitud de Demo');
        });
    </script>

</body>
</html>
